name: Deploy to Vercel

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Debug Environment Variables
        run: |
          # Note: GitHub Actions automatically masks secrets with ***
          echo "VERCEL_ORG_ID is: $VERCEL_ORG_ID"
          echo "VERCEL_PROJECT_ID is: $VERCEL_PROJECT_ID"
          # To verify token exists without exposing it, we can check its length
          echo "VERCEL_TOKEN length is: ${#VERCEL_TOKEN}"
          # If you temporarily need to bypass masking to verify values, you can use:
          # echo "Unmasked ORG_ID: $(echo $VERCEL_ORG_ID | sed 's/./& /g')"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ env.VERCEL_TOKEN }}

